<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crosspost Launcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== デザイントークン ===== */
  :root{
    --bg:        #14110e;
    --bg-glow:   #1f1a14;
    --surface:   #1d1916;
    --surface-2: #211c18;
    --border:    #35302a;
    --border-hi: #4a443b;
    --text:      #ece6dc;
    --muted:     #8f8678;
    --faint:     #5f594f;
    --accent:    #e8b04b;   /* 操作可能・アクティブ */
    --accent-dim:#9c7a37;
    --danger:    #e0693c;   /* 上限超過 */
    --ok:        #8fb469;   /* コピー成功など */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    background:
      radial-gradient(120% 80% at 50% -10%, var(--bg-glow) 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    min-height:100dvh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:clamp(16px, 4vw, 48px) 16px 64px;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }

  .app{
    width:100%;
    max-width:600px;
    animation:rise .5s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:none;} }

  /* ===== ヘッダー ===== */
  header{ margin-bottom:22px; }
  .title{
    font-family:'Instrument Serif', Georgia, serif;
    font-size:clamp(34px, 8vw, 46px);
    font-weight:400;
    letter-spacing:.5px;
    line-height:1.05;
  }
  .title em{ color:var(--accent); font-style:italic; }
  .subtitle{
    color:var(--muted);
    font-size:12.5px;
    margin-top:6px;
    letter-spacing:.3px;
  }

  /* ===== 入力エリア ===== */
  .editor-wrap{
    position:relative;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:4px;
    transition:border-color .2s;
  }
  .editor-wrap:focus-within{ border-color:var(--border-hi); }

  textarea{
    width:100%;
    min-height:190px;
    resize:vertical;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-family:inherit;
    font-size:16px;          /* iOSで自動ズームしない最小値 */
    line-height:1.65;
    padding:16px;
  }
  textarea::placeholder{ color:var(--faint); }

  /* ===== カウンター ===== */
  .counters{
    display:flex;
    gap:10px;
    margin:14px 0 18px;
  }
  .counter{
    flex:1;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:11px;
    padding:11px 13px;
  }
  .counter .row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:8px;
  }
  .counter .name{ font-size:11px; color:var(--muted); letter-spacing:.4px; }
  .counter .num{ font-size:15px; font-weight:600; font-variant-numeric:tabular-nums; }
  .counter .num .lim{ color:var(--faint); font-weight:400; font-size:12px; }
  .counter .note{ font-size:9.5px; color:var(--faint); margin-top:3px; letter-spacing:.2px; }
  .bar{
    height:3px;
    background:var(--border);
    border-radius:3px;
    margin-top:9px;
    overflow:hidden;
  }
  .bar > i{
    display:block;
    height:100%;
    width:0%;
    background:var(--accent-dim);
    border-radius:3px;
    transition:width .15s ease, background .15s ease;
  }
  .counter.over .num{ color:var(--danger); }
  .counter.over .bar > i{ background:var(--danger); }

  /* ===== ボタン ===== */
  .actions{ display:flex; flex-direction:column; gap:10px; }
  .open-row{ display:flex; gap:10px; }
  @media (max-width:430px){ .open-row{ flex-direction:column; } }

  button{
    font-family:inherit;
    font-size:14px;
    font-weight:500;
    letter-spacing:.3px;
    color:var(--text);
    background:var(--surface-2);
    border:1px solid var(--border-hi);
    border-radius:11px;
    padding:14px 16px;
    cursor:pointer;
    transition:transform .08s, border-color .2s, background .2s, color .2s;
    -webkit-tap-highlight-color:transparent;
  }
  button:hover{ border-color:var(--accent); color:var(--accent); }
  button:active{ transform:translateY(1px); }

  .btn-open{ flex:1; }
  .btn-open .tag{ display:block; font-size:10px; color:var(--muted); margin-top:3px; letter-spacing:.4px; }
  .btn-open:hover .tag{ color:var(--accent-dim); }

  .btn-copy{ width:100%; }
  .btn-copy.copied{ border-color:var(--ok); color:var(--ok); }

  .btn-clear{
    width:100%;
    background:transparent;
    border-color:transparent;
    color:var(--faint);
    font-size:12px;
    padding:8px;
  }
  .btn-clear:hover{ color:var(--muted); border-color:transparent; }

  /* ===== テンプレート ===== */
  .template-section{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }

  .template-save-row{ display:flex; gap:8px; }

  .tmpl-input{
    flex:1;
    background:var(--surface-2);
    border:1px solid var(--border-hi);
    border-radius:11px;
    padding:13px 14px;
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    outline:none;
    transition:border-color .2s;
  }
  .tmpl-input:focus{ border-color:var(--accent); }
  .tmpl-input::placeholder{ color:var(--faint); }

  .btn-tmpl-save{ white-space:nowrap; }

  .tmpl-msg{
    font-size:11.5px;
    padding:0 4px;
    min-height:16px;
    color:transparent;
    transition:color .15s;
  }
  .tmpl-msg.ok{ color:var(--ok); }
  .tmpl-msg.err{ color:var(--danger); }

  .btn-tmpl-toggle{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
    padding:11px 14px;
    font-size:13px;
    color:var(--muted);
    background:transparent;
    border:1px solid var(--border);
    border-radius:11px;
    text-align:left;
  }
  .btn-tmpl-toggle:hover{ color:var(--text); border-color:var(--border-hi); }

  .tmpl-badge{
    background:var(--border);
    color:var(--muted);
    font-size:10px;
    padding:1px 7px;
    border-radius:20px;
    font-variant-numeric:tabular-nums;
  }

  .tmpl-arrow{ margin-left:auto; font-size:10px; color:var(--faint); transition:transform .2s; }
  .tmpl-arrow.open{ transform:rotate(180deg); }

  .tmpl-list{ display:flex; flex-direction:column; gap:6px; }

  .tmpl-empty{
    font-size:12px;
    color:var(--faint);
    text-align:center;
    padding:16px;
  }

  .tmpl-item{
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:11px;
    padding:12px 14px;
  }

  .tmpl-item-name{
    font-size:13px;
    font-weight:600;
    color:var(--text);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    min-width:0;
    flex:1;
  }

  .tmpl-item-preview{
    font-size:11px;
    color:var(--faint);
    margin-top:4px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .tmpl-item-btns{ display:flex; gap:6px; margin-top:10px; }

  .btn-tmpl-load, .btn-tmpl-delete{
    font-size:12px;
    padding:7px 12px;
    border-radius:8px;
  }

  .btn-tmpl-delete{ color:var(--faint); border-color:var(--border); }
  .btn-tmpl-delete:hover{ color:var(--danger); border-color:var(--danger); }

  .tmpl-confirm{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
    flex-wrap:wrap;
  }

  .tmpl-confirm-btns{ display:flex; gap:6px; }

  .btn-confirm-yes{
    font-size:12px;
    padding:6px 11px;
    border-radius:8px;
    color:var(--danger);
    border-color:var(--danger);
  }
  .btn-confirm-yes:hover{ background:rgba(224,105,60,.1); color:var(--danger); }

  .btn-confirm-no{
    font-size:12px;
    padding:6px 11px;
    border-radius:8px;
  }

  .btn-tmpl-edit{ font-size:12px; padding:7px 12px; border-radius:8px; }

  .tmpl-edit-form{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .tmpl-edit-name{
    background:var(--surface);
    border:1px solid var(--border-hi);
    border-radius:8px;
    padding:9px 11px;
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    outline:none;
    transition:border-color .2s;
    width:100%;
  }
  .tmpl-edit-name:focus{ border-color:var(--accent); }

  .tmpl-edit-body{
    background:var(--surface);
    border:1px solid var(--border-hi);
    border-radius:8px;
    padding:9px 11px;
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    line-height:1.6;
    outline:none;
    resize:vertical;
    min-height:100px;
    width:100%;
    transition:border-color .2s;
  }
  .tmpl-edit-body:focus{ border-color:var(--accent); }

  .tmpl-edit-btns{ display:flex; gap:6px; }

  .btn-edit-save{
    font-size:12px;
    padding:7px 12px;
    border-radius:8px;
    color:var(--accent);
    border-color:var(--accent-dim);
  }
  .btn-edit-save:hover{ background:rgba(232,176,75,.08); color:var(--accent); border-color:var(--accent); }

  .btn-edit-cancel{
    font-size:12px;
    padding:7px 12px;
    border-radius:8px;
  }

  /* ===== ドラッグ＆ドロップ ===== */
  .tmpl-drag-handle{
    cursor:grab;
    color:var(--faint);
    font-size:14px;
    padding-right:8px;
    user-select:none;
    flex-shrink:0;
    line-height:1.4;
  }
  .tmpl-drag-handle:active{ cursor:grabbing; }
  .tmpl-item.dragging{ opacity:.3; }
  .tmpl-item.drag-over-top{
    box-shadow:0 -2px 0 var(--accent), inset 0 0 0 1px var(--border);
  }
  .tmpl-item.drag-over-bottom{
    box-shadow:0 2px 0 var(--accent), inset 0 0 0 1px var(--border);
  }

  /* ===== ピン止め ===== */
  .tmpl-item-header{
    display:flex;
    align-items:flex-start;
    margin-bottom:4px;
  }

  .btn-tmpl-pin{
    font-size:11px;
    padding:2px 7px;
    border-radius:6px;
    border:1px solid transparent;
    background:transparent;
    color:var(--faint);
    margin-left:auto;
    flex-shrink:0;
    line-height:1.4;
  }
  .btn-tmpl-pin:hover{ color:var(--accent); border-color:transparent; background:transparent; }
  .btn-tmpl-pin.pinned{ color:var(--accent); border-color:var(--accent-dim); background:rgba(232,176,75,.08); }
  .btn-tmpl-pin.pinned:hover{ color:var(--danger); border-color:var(--danger); background:transparent; }

  .tmpl-item.pinned-item{ border-color:var(--accent-dim); }

  .tmpl-section-label{
    font-size:10px;
    color:var(--faint);
    letter-spacing:.5px;
    padding:4px 2px 2px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .tmpl-section-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--border);
  }

  /* ===== エクスポート／インポート ===== */
  .tmpl-transfer-row{
    display:flex;
    gap:8px;
  }

  .btn-transfer{
    flex:1;
    font-size:12px;
    padding:9px 12px;
    color:var(--muted);
    background:transparent;
    border:1px solid var(--border);
    border-radius:11px;
    text-align:center;
  }
  .btn-transfer:hover{ color:var(--text); border-color:var(--border-hi); }

  .tmpl-import-choice{
    background:var(--surface-2);
    border:1px solid var(--border-hi);
    border-radius:11px;
    padding:12px 14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .tmpl-import-msg{ font-size:12px; color:var(--muted); line-height:1.6; }

  .tmpl-import-btns{ display:flex; gap:6px; flex-wrap:wrap; }

  .btn-import-add{
    font-size:12px;
    padding:7px 12px;
    border-radius:8px;
    color:var(--accent);
    border-color:var(--accent-dim);
  }
  .btn-import-add:hover{ background:rgba(232,176,75,.08); color:var(--accent); border-color:var(--accent); }

  .btn-import-replace{
    font-size:12px;
    padding:7px 12px;
    border-radius:8px;
    color:var(--danger);
    border-color:var(--danger);
  }
  .btn-import-replace:hover{ background:rgba(224,105,60,.1); }

  .btn-import-cancel{ font-size:12px; padding:7px 12px; border-radius:8px; }

  /* ===== 注意書き ===== */
  .foot{
    margin-top:22px;
    padding-top:16px;
    border-top:1px solid var(--border);
    font-size:11px;
    color:var(--faint);
    line-height:1.7;
  }
  .foot b{ color:var(--muted); font-weight:500; }

  /* ===== ステータス（aria-live） ===== */
  .status{
    position:fixed;
    left:50%; bottom:22px;
    transform:translateX(-50%) translateY(20px);
    background:var(--surface);
    border:1px solid var(--border-hi);
    color:var(--text);
    font-size:13px;
    padding:10px 18px;
    border-radius:10px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s, transform .2s;
    box-shadow:0 8px 28px rgba(0,0,0,.4);
  }
  .status.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <main class="app">
    <header>
      <h1 class="title">Crosspost <em>Launcher</em></h1>
      <p class="subtitle">1か所で書く → X / Threads は事前入力で開く・Substack はコピー</p>
    </header>

    <div class="editor-wrap">
      <textarea id="text" placeholder="ここに本文を書く…" autofocus></textarea>
    </div>

    <div class="counters">
      <div class="counter" id="counter-x">
        <div class="row">
          <span class="name">X</span>
          <span class="num"><span id="x-count">0</span><span class="lim"> / 280</span></span>
        </div>
        <div class="note">全角は2文字換算（実質 約140字）</div>
        <div class="bar"><i id="x-bar"></i></div>
      </div>
      <div class="counter" id="counter-th">
        <div class="row">
          <span class="name">Threads</span>
          <span class="num"><span id="th-count">0</span><span class="lim"> / 500</span></span>
        </div>
        <div class="note">そのままの文字数</div>
        <div class="bar"><i id="th-bar"></i></div>
      </div>
    </div>

    <div class="actions">
      <div class="open-row">
        <button class="btn-open" id="btn-x" type="button">
          Xを開く
          <span class="tag">事前入力 → 内容を確認して投稿</span>
        </button>
        <button class="btn-open" id="btn-th" type="button">
          Threadsを開く
          <span class="tag">事前入力 → 内容を確認して投稿</span>
        </button>
      </div>
      <button class="btn-copy" id="btn-copy" type="button">Substack用にコピー</button>
      <button class="btn-clear" id="btn-clear" type="button">クリア</button>
    </div>

    <div class="template-section">
      <div class="template-save-row">
        <input type="text" id="tmpl-name" class="tmpl-input" placeholder="テンプレート名…" maxlength="50">
        <button class="btn-tmpl-save" id="btn-tmpl-save" type="button">保存</button>
      </div>
      <div class="tmpl-msg" id="tmpl-msg"></div>
      <div class="tmpl-transfer-row">
        <button class="btn-transfer" id="btn-export" type="button">エクスポート</button>
        <button class="btn-transfer" id="btn-import" type="button">インポート</button>
        <input type="file" id="import-input" hidden>
      </div>
      <button class="btn-tmpl-toggle" id="btn-tmpl-toggle" type="button">
        テンプレート一覧<span class="tmpl-badge" id="tmpl-badge">0</span><span class="tmpl-arrow" id="tmpl-arrow">▼</span>
      </button>
      <div class="tmpl-list" id="tmpl-list" hidden></div>
    </div>

    <p class="foot">
      <b>X</b> / <b>Threads</b> は事前入力までで、最後の投稿ボタンは各サイトで自分で押します（投稿前に確認できます）。
      <b>Substack</b> はコピー後、Notes に貼り付けて投稿してください。<br>
      ※ 絵文字は事前入力時にまれに文字化けすることがあります。気になる場合は開いた先で貼り直してください。
    </p>
  </main>

  <div class="status" id="status" role="status" aria-live="polite"></div>

<script>
  // ===== 要素参照 =====
  const ta       = document.getElementById('text');
  const xCountEl = document.getElementById('x-count');
  const thCountEl= document.getElementById('th-count');
  const xBar     = document.getElementById('x-bar');
  const thBar    = document.getElementById('th-bar');
  const xWrap    = document.getElementById('counter-x');
  const thWrap   = document.getElementById('counter-th');
  const statusEl = document.getElementById('status');

  const X_LIMIT  = 280;   // 重み付き（全角=2）
  const TH_LIMIT = 500;   // 文字数そのまま

  // ===== Xの重み付き文字数（全角/CJK系は2、その他は1） =====
  // X(twitter-text)の weighted length を近似。URLの23字換算は未対応（仕様書に明記）。
  function isWide(cp){
    return (
      (cp>=0x1100 && cp<=0x11FF) ||  // ハングル字母
      (cp>=0x2E80 && cp<=0x303E) ||  // CJK部首・漢字記号・句読点ほか
      (cp>=0x3041 && cp<=0x33FF) ||  // ひらがな・カタカナ・CJK記号
      (cp>=0x3400 && cp<=0x4DBF) ||  // CJK拡張A
      (cp>=0x4E00 && cp<=0x9FFF) ||  // CJK統合漢字
      (cp>=0xA000 && cp<=0xA4CF) ||
      (cp>=0xAC00 && cp<=0xD7A3) ||  // ハングル音節
      (cp>=0xF900 && cp<=0xFAFF) ||  // CJK互換漢字
      (cp>=0xFF00 && cp<=0xFFEF) ||  // 全角形
      (cp>=0x20000 && cp<=0x3FFFF)   // CJK拡張B以降
    );
  }
  function xWeighted(str){
    let w = 0;
    for(const ch of str){
      w += isWide(ch.codePointAt(0)) ? 2 : 1;
    }
    return w;
  }
  // Threadsはコードポイント数（絵文字・サロゲートペアを1として数える）
  function codePointLength(str){
    return [...str].length;
  }

  // ===== カウンター更新 =====
  function update(){
    const t = ta.value;
    const xw = xWeighted(t);
    const tl = codePointLength(t);

    xCountEl.textContent  = xw;
    thCountEl.textContent = tl;

    xBar.style.width  = Math.min(100, (xw / X_LIMIT) * 100) + '%';
    thBar.style.width = Math.min(100, (tl / TH_LIMIT) * 100) + '%';

    xWrap.classList.toggle('over',  xw > X_LIMIT);
    thWrap.classList.toggle('over', tl > TH_LIMIT);
  }
  ta.addEventListener('input', update);

  // ===== ステータス表示 =====
  let statusTimer;
  function flash(msg){
    statusEl.textContent = msg;
    statusEl.classList.add('show');
    clearTimeout(statusTimer);
    statusTimer = setTimeout(()=> statusEl.classList.remove('show'), 1600);
  }

  // ===== intent URLで開く =====
  function openIntent(kind){
    const t = ta.value.trim();
    if(!t){ flash('本文が空です'); ta.focus(); return; }
    const enc = encodeURIComponent(t);
    const url = kind === 'x'
      ? 'https://twitter.com/intent/tweet?text=' + enc
      : 'https://www.threads.net/intent/post?text=' + enc;
    window.open(url, '_blank', 'noopener');
  }
  document.getElementById('btn-x').addEventListener('click',  ()=> openIntent('x'));
  document.getElementById('btn-th').addEventListener('click', ()=> openIntent('th'));

  // ===== コピー（https環境必須／フォールバック付き） =====
  const copyBtn = document.getElementById('btn-copy');
  async function copyText(){
    const t = ta.value.trim();
    if(!t){ flash('本文が空です'); ta.focus(); return; }
    window.open('https://substack.com/notes', '_blank', 'noopener');
    try{
      await navigator.clipboard.writeText(t);
      copied();
    }catch(e){
      // 旧方式フォールバック
      try{
        ta.select();
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        copied();
      }catch(e2){
        flash('コピーに失敗しました（httpsで開いているか確認）');
      }
    }
  }
  function copied(){
    copyBtn.textContent = 'コピーしました ✓';
    copyBtn.classList.add('copied');
    flash('Substack用にコピーしました');
    setTimeout(()=>{
      copyBtn.textContent = 'Substack用にコピー';
      copyBtn.classList.remove('copied');
    }, 1600);
  }
  copyBtn.addEventListener('click', copyText);

  // ===== クリア =====
  document.getElementById('btn-clear').addEventListener('click', ()=>{
    ta.value = '';
    update();
    ta.focus();
  });

  // 初期化
  update();

  // ===== テンプレート機能 =====
  const STORAGE_KEY = 'crosspost_templates';

  function loadTemplates(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    }catch{ return []; }
  }

  function saveTemplates(list){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      return true;
    }catch{ return false; }
  }

  function renderTemplates(){
    const templates = loadTemplates();
    const listEl = document.getElementById('tmpl-list');
    const badge  = document.getElementById('tmpl-badge');
    badge.textContent = templates.length;
    listEl.replaceChildren();

    if(templates.length === 0){
      const empty = document.createElement('p');
      empty.className = 'tmpl-empty';
      empty.textContent = '保存済みテンプレートはありません';
      listEl.appendChild(empty);
      return;
    }

    const pinned   = templates.filter(t => t.pinned);
    const unpinned = templates.filter(t => !t.pinned);

    if(pinned.length > 0){
      listEl.appendChild(makeSection('ピン留め'));
      pinned.forEach(t => listEl.appendChild(buildItem(t)));
    }
    if(unpinned.length > 0){
      if(pinned.length > 0) listEl.appendChild(makeSection('その他'));
      unpinned.forEach(t => listEl.appendChild(buildItem(t)));
    }
  }

  function makeSection(label){
    const el = document.createElement('div');
    el.className = 'tmpl-section-label';
    el.textContent = label;
    return el;
  }

  function buildItem(tmpl){
    const item = document.createElement('div');
    item.className = 'tmpl-item' + (tmpl.pinned ? ' pinned-item' : '');

    // ドラッグ＆ドロップ（ハンドルからのみ開始）
    item.addEventListener('dragover',  e => onDragOver(e, tmpl.id, item));
    item.addEventListener('dragleave', e => onDragLeave(e, item));
    item.addEventListener('drop',      e => onDrop(e, tmpl, item));

    // ヘッダー行: [ハンドル] [名前] [ピンボタン]
    const header = document.createElement('div');
    header.className = 'tmpl-item-header';

    const grip = document.createElement('span');
    grip.className = 'tmpl-drag-handle';
    grip.textContent = '⠿';
    grip.setAttribute('aria-hidden', 'true');
    grip.draggable = true;
    grip.addEventListener('dragstart', e => {
      dragSrcId = tmpl.id;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setDragImage(item, 10, 10);
      setTimeout(() => item.classList.add('dragging'), 0);
    });
    grip.addEventListener('dragend', e => {
      item.classList.remove('dragging');
      document.querySelectorAll('.tmpl-item').forEach(el =>
        el.classList.remove('drag-over-top', 'drag-over-bottom'));
      dragSrcId = null;
    });

    const nameEl = document.createElement('div');
    nameEl.className = 'tmpl-item-name';
    nameEl.textContent = tmpl.name;

    const pinBtn = document.createElement('button');
    pinBtn.className = 'btn-tmpl-pin' + (tmpl.pinned ? ' pinned' : '');
    pinBtn.type = 'button';
    pinBtn.title = tmpl.pinned ? '固定を解除' : 'トップに固定';
    pinBtn.textContent = '▲';
    pinBtn.addEventListener('click', () => togglePin(tmpl.id));

    header.appendChild(grip);
    header.appendChild(nameEl);
    header.appendChild(pinBtn);

    const preview = document.createElement('div');
    preview.className = 'tmpl-item-preview';
    preview.textContent = tmpl.body.replace(/\n/g, ' ');

    const btns = document.createElement('div');
    btns.className = 'tmpl-item-btns';

    const loadBtn = document.createElement('button');
    loadBtn.className = 'btn-tmpl-load';
    loadBtn.type = 'button';
    loadBtn.textContent = '読み込む';
    loadBtn.addEventListener('click', () => handleLoad(tmpl, item));

    const editBtn = document.createElement('button');
    editBtn.className = 'btn-tmpl-edit';
    editBtn.type = 'button';
    editBtn.textContent = '編集';
    editBtn.addEventListener('click', () => toggleEditForm(item, tmpl));

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-tmpl-delete';
    delBtn.type = 'button';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', () => showConfirm(item, '削除しますか？', '削除する', () => {
      const ok = saveTemplates(loadTemplates().filter(t => t.id !== tmpl.id));
      if(ok){ renderTemplates(); flash('テンプレートを削除しました'); }
      else  { showTmplMsg('削除できませんでした', 'err'); }
    }));

    btns.appendChild(loadBtn);
    btns.appendChild(editBtn);
    btns.appendChild(delBtn);
    item.appendChild(header);
    item.appendChild(preview);
    item.appendChild(btns);
    return item;
  }

  // ===== ピン止め =====
  function togglePin(id){
    const templates = loadTemplates();
    const idx = templates.findIndex(t => t.id === id);
    const wasP = templates[idx].pinned;
    const updated = { ...templates[idx], pinned: !wasP };
    const others  = templates.filter(t => t.id !== id);

    let next;
    if(!wasP){
      // ピン→配列先頭へ
      next = [updated, ...others];
    } else {
      // 解除→ピン済みの直後へ
      const lastPinIdx = others.reduce((acc, t, i) => t.pinned ? i : acc, -1);
      next = [...others];
      next.splice(lastPinIdx + 1, 0, updated);
    }
    saveTemplates(next);
    renderTemplates();
    flash(wasP ? '固定を解除しました' : 'トップに固定しました');
  }

  // ===== ドラッグ＆ドロップ =====
  let dragSrcId = null;

  function onDragOver(e, targetId, el){
    if(!dragSrcId || dragSrcId === targetId) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = el.getBoundingClientRect();
    const mid  = rect.top + rect.height / 2;
    document.querySelectorAll('.tmpl-item').forEach(x =>
      x.classList.remove('drag-over-top', 'drag-over-bottom'));
    el.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
  }

  function onDragLeave(e, el){
    if(!el.contains(e.relatedTarget))
      el.classList.remove('drag-over-top', 'drag-over-bottom');
  }

  function onDrop(e, targetTmpl, el){
    e.preventDefault();
    if(!dragSrcId || dragSrcId === targetTmpl.id) return;
    el.classList.remove('drag-over-top', 'drag-over-bottom');

    const rect   = el.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;

    const templates = loadTemplates();
    // ドロップ先のピン状態を引き継ぐ（区間をまたぐとピン状態が変わる）
    const srcItem = { ...templates.find(t => t.id === dragSrcId), pinned: targetTmpl.pinned };
    const rest    = templates.filter(t => t.id !== dragSrcId);
    const ti      = rest.findIndex(t => t.id === targetTmpl.id);
    rest.splice(before ? ti : ti + 1, 0, srcItem);
    saveTemplates(rest);
    renderTemplates();
    dragSrcId = null;
  }

  function handleLoad(tmpl, item){
    if(!ta.value.trim()){
      ta.value = tmpl.body;
      update();
      flash('テンプレートを読み込みました');
    } else {
      showConfirm(item, '現在の内容を上書きしますか？', '上書きする', () => {
        ta.value = tmpl.body;
        update();
        flash('テンプレートを読み込みました');
      });
    }
  }

  function toggleEditForm(item, tmpl){
    const existing = item.querySelector('.tmpl-edit-form');
    if(existing){ existing.remove(); return; }

    item.querySelector('.tmpl-confirm')?.remove();

    const form = document.createElement('div');
    form.className = 'tmpl-edit-form';

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'tmpl-edit-name';
    nameInput.value = tmpl.name;
    nameInput.maxLength = 50;
    nameInput.placeholder = 'テンプレート名…';

    const bodyTA = document.createElement('textarea');
    bodyTA.className = 'tmpl-edit-body';
    bodyTA.value = tmpl.body;
    bodyTA.placeholder = '本文…';

    const editBtns = document.createElement('div');
    editBtns.className = 'tmpl-edit-btns';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn-edit-save';
    saveBtn.type = 'button';
    saveBtn.textContent = '保存';
    saveBtn.addEventListener('click', () => {
      const newName = nameInput.value.trim();
      const newBody = bodyTA.value.trim();
      if(!newName){ nameInput.focus(); flash('名前を入力してください'); return; }
      if(!newBody){ bodyTA.focus(); flash('本文が空です'); return; }

      const templates = loadTemplates();
      const conflict = templates.find(t => t.name === newName && t.id !== tmpl.id);
      if(conflict){ flash('その名前はすでに使用中です'); nameInput.focus(); return; }

      const next = templates.map(t => t.id === tmpl.id
        ? { ...t, name: newName, body: newBody, savedAt: Date.now() }
        : t
      );
      if(saveTemplates(next)){
        renderTemplates();
        flash('テンプレートを更新しました');
      } else {
        flash('保存できませんでした');
      }
    });

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn-edit-cancel';
    cancelBtn.type = 'button';
    cancelBtn.textContent = 'キャンセル';
    cancelBtn.addEventListener('click', () => form.remove());

    editBtns.appendChild(saveBtn);
    editBtns.appendChild(cancelBtn);
    form.appendChild(nameInput);
    form.appendChild(bodyTA);
    form.appendChild(editBtns);
    item.appendChild(form);
    nameInput.focus();
  }

  function showConfirm(parentEl, question, yesLabel, onYes){
    parentEl.querySelector('.tmpl-confirm')?.remove();

    const wrap = document.createElement('div');
    wrap.className = 'tmpl-confirm';

    const msg = document.createElement('span');
    msg.textContent = question;

    const btnWrap = document.createElement('div');
    btnWrap.className = 'tmpl-confirm-btns';

    const yesBtn = document.createElement('button');
    yesBtn.className = 'btn-confirm-yes';
    yesBtn.type = 'button';
    yesBtn.textContent = yesLabel;
    yesBtn.addEventListener('click', () => { wrap.remove(); onYes(); });

    const noBtn = document.createElement('button');
    noBtn.className = 'btn-confirm-no';
    noBtn.type = 'button';
    noBtn.textContent = 'キャンセル';
    noBtn.addEventListener('click', () => wrap.remove());

    btnWrap.appendChild(yesBtn);
    btnWrap.appendChild(noBtn);
    wrap.appendChild(msg);
    wrap.appendChild(btnWrap);
    parentEl.appendChild(wrap);
  }

  let tmplMsgTimer;
  function showTmplMsg(msg, type){
    const el = document.getElementById('tmpl-msg');
    el.textContent = msg;
    el.className = 'tmpl-msg ' + type;
    clearTimeout(tmplMsgTimer);
    tmplMsgTimer = setTimeout(() => { el.textContent = ''; el.className = 'tmpl-msg'; }, 2400);
  }

  function handleSave(){
    const nameInput = document.getElementById('tmpl-name');
    const name = nameInput.value.trim();
    const body = ta.value.trim();

    if(!name){ showTmplMsg('名前を入力してください', 'err'); nameInput.focus(); return; }
    if(!body){ showTmplMsg('本文が空です', 'err'); ta.focus(); return; }

    const templates = loadTemplates();
    const idx = templates.findIndex(t => t.name === name);
    let next;
    if(idx >= 0){
      next = [...templates];
      next[idx] = { ...next[idx], body, savedAt: Date.now() };
    } else {
      next = [...templates, { id: crypto.randomUUID(), name, body, savedAt: Date.now(), pinned: false }];
    }

    const ok = saveTemplates(next);
    if(ok){
      renderTemplates();
      nameInput.value = '';
      showTmplMsg(idx >= 0 ? '上書き保存しました' : '保存しました', 'ok');
      if(document.getElementById('tmpl-list').hidden) toggleList();
    } else {
      showTmplMsg('保存できませんでした', 'err');
    }
  }

  function toggleList(){
    const list  = document.getElementById('tmpl-list');
    const arrow = document.getElementById('tmpl-arrow');
    list.hidden = !list.hidden;
    arrow.classList.toggle('open', !list.hidden);
  }

  document.getElementById('btn-tmpl-save').addEventListener('click', handleSave);
  document.getElementById('tmpl-name').addEventListener('keydown', e => { if(e.key === 'Enter') handleSave(); });
  document.getElementById('btn-tmpl-toggle').addEventListener('click', toggleList);

  // ===== エクスポート =====
  function handleExport(){
    const templates = loadTemplates();
    if(templates.length === 0){ flash('テンプレートがありません'); return; }
    const blob = new Blob([JSON.stringify(templates, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'crosspost-templates.json';
    a.click();
    URL.revokeObjectURL(url);
    flash('エクスポートしました');
  }

  // ===== インポート =====
  const importInput = document.getElementById('import-input');

  function handleImportFile(file){
    // accept属性なし → JS側で拡張子チェック
    if(!file.name.toLowerCase().endsWith('.json')){
      flash('JSONファイルを選択してください');
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      let data;
      try{
        data = JSON.parse(ev.target.result);
        if(!Array.isArray(data)) throw new Error();
        if(!data.every(t => t.id && t.name && typeof t.body === 'string')) throw new Error();
      }catch{
        flash('ファイルの形式が正しくありません');
        return;
      }
      const existing = loadTemplates();
      if(existing.length > 0){
        showImportChoice(data);
      } else {
        doImport(data, 'replace');
      }
    };
    reader.readAsText(file);
  }

  function showImportChoice(incoming){
    document.querySelector('.tmpl-import-choice')?.remove();

    const wrap = document.createElement('div');
    wrap.className = 'tmpl-import-choice';

    const msg = document.createElement('div');
    msg.className = 'tmpl-import-msg';
    msg.textContent = incoming.length + '件を読み込みます。既存テンプレートをどうしますか？';

    const btnWrap = document.createElement('div');
    btnWrap.className = 'tmpl-import-btns';

    const addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'btn-import-add';
    addBtn.textContent = '追加（既存を残す）';
    addBtn.addEventListener('click', () => { wrap.remove(); doImport(incoming, 'merge'); });

    const replaceBtn = document.createElement('button');
    replaceBtn.type = 'button';
    replaceBtn.className = 'btn-import-replace';
    replaceBtn.textContent = '上書き（既存を削除）';
    replaceBtn.addEventListener('click', () => { wrap.remove(); doImport(incoming, 'replace'); });

    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'btn-import-cancel';
    cancelBtn.textContent = 'キャンセル';
    cancelBtn.addEventListener('click', () => wrap.remove());

    btnWrap.appendChild(addBtn);
    btnWrap.appendChild(replaceBtn);
    btnWrap.appendChild(cancelBtn);
    wrap.appendChild(msg);
    wrap.appendChild(btnWrap);

    document.querySelector('.tmpl-transfer-row').insertAdjacentElement('afterend', wrap);
  }

  function doImport(incoming, mode){
    let next;
    if(mode === 'replace'){
      next = incoming;
    } else {
      const existing = loadTemplates();
      const existingIds = new Set(existing.map(t => t.id));
      const newItems = incoming.filter(t => !existingIds.has(t.id));
      next = [...existing, ...newItems];
    }
    if(saveTemplates(next)){
      renderTemplates();
      if(document.getElementById('tmpl-list').hidden) toggleList();
      flash(next.length + '件のテンプレートを読み込みました');
    } else {
      flash('インポートに失敗しました');
    }
  }

  document.getElementById('btn-export').addEventListener('click', handleExport);
  document.getElementById('btn-import').addEventListener('click', () => importInput.click());
  importInput.addEventListener('change', e => {
    const file = e.target.files[0];
    importInput.value = '';
    if(file) handleImportFile(file);
  });

  renderTemplates();
</script>
</body>
</html>
